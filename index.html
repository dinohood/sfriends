<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Native 1080p 60FPS Streamer</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        video { width: 100%; max-height: 500px; background: #000; border-radius: 8px; margin: 20px 0; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 24px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; margin: 5px; }
        button:hover { background: #2563eb; }
        input { padding: 12px; width: 250px; border-radius: 6px; border: 1px solid #475569; background: #334155; color: white; font-size: 15px; }
        #errorLog { color: #f87171; background: #451a03; border: 1px solid #78350f; padding: 10px; border-radius: 6px; display: none; margin-top: 15px; font-family: monospace; }
        .status { font-weight: bold; color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Native Browser Streamer (60 FPS)</h1>
        <p>Ensure your URL bar reads <span class="status">http://localhost:5500</span></p>
        
        <div>
            <button id="startBtn">1. Capture Screen</button>
            <br><br>
            <input type="text" id="roomInput" placeholder="Enter secret room name">
            <button id="connectBtn">2. Connect Stream</button>
        </div>

        <div id="errorLog"></div>
        <video id="previewVideo" autoplay playsinline controls></video>
    </div>

    <!-- Sourced from ScaleDrone for robust, free signaling links -->
    <script src="https://scaledrone.com"></script>
    <script>
        let localStream;
        let pc;
        const roomHash = "observable-"; // ScaleDrone requirement for peer rooms
        
        const startBtn = document.getElementById('startBtn');
        const connectBtn = document.getElementById('connectBtn');
        const previewVideo = document.getElementById('previewVideo');
        const errorLog = document.getElementById('errorLog');

        function showError(message) {
            errorLog.innerText = `Error: ${message}`;
            errorLog.style.display = 'block';
        }

        // 1. Capture Video using standard WebRTC constraints
        startBtn.onclick = async () => {
            errorLog.style.display = 'none';
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        width: { ideal: 1920, max: 2560 },
                        height: { ideal: 1080, max: 1440 },
                        frameRate: { ideal: 60, max: 60 } // Compliant 60fps limit logic
                    },
                    audio: true
                });
                previewVideo.srcObject = localStream;
                previewVideo.muted = true; 
            } catch (err) {
                showError(`${err.name} - ${err.message}`);
            }
        };

        // 2. Setup Connection
        connectBtn.onclick = () => {
            const roomName = document.getElementById('roomInput').value;
            if (!roomName) return alert("Please enter a room name first!");
            
            // Check if library compiled successfully
            if (typeof ScaleDrone === 'undefined') {
                showError("ScaleDrone library failed to load. Check your internet or disable adblock.");
                return;
            }

            // Using ScaleDrone's public demo channel ID
            const drone = new ScaleDrone('yiS12TsdtSp6YmqM'); 
            
            drone.on('open', error => {
                if (error) return showError(error);
                
                const room = drone.subscribe(roomHash + roomName);
                
                room.on('open', error => {
                    if (error) return showError(error);
                    setupWebRTC(drone, roomName, !!localStream);
                });
            });
        };

        function setupWebRTC(drone, roomName, isStreamer) {
            const config = { iceServers: [{ urls: 'stun:://google.com' }] };
            pc = new RTCPeerConnection(config);

            pc.onicecandidate = event => {
                if (event.candidate) {
                    drone.publish({
                        room: roomHash + roomName,
                        message: { candidate: event.candidate }
                    });
                }
            };

            if (isStreamer && localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            pc.ontrack = event => {
                if (!previewVideo.srcObject || previewVideo.srcObject === localStream) {
                    previewVideo.srcObject = event.streams[0];
                    previewVideo.muted = false;
                }
            };

            // Handshake logic
            if (isStreamer) {
                pc.createOffer().then(offer => {
                    pc.setLocalDescription(offer);
                    drone.publish({ room: roomHash + roomName, message: { offer: offer } });
                });
            }

            drone.on('message', message => {
                const data = message.data;
                if (message.clientId === drone.clientId) return; // Ignore self

                if (data.offer && !isStreamer) {
                    pc.setRemoteDescription(new RTCSessionDescription(data.offer))
                      .then(() => pc.createAnswer())
                      .then(answer => {
                          pc.setLocalDescription(answer);
                          drone.publish({ room: roomHash + roomName, message: { answer: answer } });
                      });
                } else if (data.answer && isStreamer) {
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                } else if (data.candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e => {});
                }
            });
        }
    </script>
</body>
</html>
